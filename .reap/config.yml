version: 0.1.0
project: reap
entryMode: greenfield
hooks:
  onGenerationComplete:
    - command: "~/.bun/bin/bun run src/cli/index.ts -- update"
    - prompt: |
        Identify the features/CLI/slash commands changed in this Generation,
        and update README.md, README.ko.md, src/templates/hooks/reap-guide.md,
        and the related documentation pages in docs/src/pages/.
        Skip if there are no changes.
