name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run tests (if submodule available)
        run: |
          if find tests -name "*.test.ts" 2>/dev/null | grep -q .; then
            bun test
          else
            echo "Tests submodule not available — skipping (private repo)"
          fi

      - run: npm run build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            gh release create "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
